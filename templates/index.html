<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>My First AI Agent using LangChain</title>
</head>
<style>
body{
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}
.hero {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.main .main-heading {
    font-size: 28px;
}
.container {
    display: flex;
    justify-content: center;
    align-items: center;
}
.input-box{
    display: inline;
}

.input {
    width: 800px;
    padding: 15px 10px;
    border-radius: 30px;
    font-size: 17px;
    padding-left: 26px;
}
#send-btn {
    border-radius: 30px;
    padding: 17px 20px;
    font-size: 17px;
}
#send-btn:hover{
    cursor: pointer;
    background-color: #dedede;
}
.footer {
    position: absolute;
    bottom: 5px;
    left: 0;
    width: 100%;
    text-align: center;

}

.footer p {
    margin: 0;
    font-size: 13px
}

</style>
<body>
    <div class = "hero">
    <div class ="main">
        <h1 class="main-heading">Hi there! How can I help you today?</h1>
    </div>
    <div class = "container">
        <div class = "output-box">
        </div>
        <div class = "input-box">
        <input type = "text" id = "input" class = "input" placeholder = "Ask me anything...?">
        <button id ="send-btn" class = "send-btn">Send</button>
        </div>
    </div>
</div>
    <footer class ="footer">
        <p class = "footer-heading">By Umamaheshwara Reddy</p>
    </footer>
</body>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const input = document.querySelector(".input");
    const sendBtn = document.querySelector(".send-btn");
    const outputBox = document.querySelector(".output-box");
    const container = document.querySelector(".container");
    const mainHeading = document.querySelector(".main-heading");
    let msgCount = 0; 
    sendBtn.addEventListener("click", async () => {
        mainHeading.remove();
        const query = input.value.trim();
        input.value = "";
        input.focus();
        sendBtn.textContent = "Wait"
        container.style.position = "absolute";
        container.style.bottom = "80px";
        p = document.createElement("p");
        outputBox.style.position = "absolute";
        outputBox.style.bottom = "100px";
        p.innerText = "Loading..."
        outputBox.appendChild(p);
        async function getData () {
            const res = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    query: query
                })
            })
            return await res.json()
        }
        const data = await getData();

        if (msgCount > 0) {
        const hr = document.createElement("hr");
        outputBox.appendChild(hr);
        }

        p.innerHTML = marked.parse(data.text);
        sendBtn.textContent = "Send";
        msgCount = 1
    });
</script>
</html>
